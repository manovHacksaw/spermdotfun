[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "cancun"
via_ir = true
optimizer = true
optimizer_runs = 200
remappings = [
  "@chainlink/contracts/=lib/chainlink-brownie-contracts/contracts/",
  "@openzeppelin/=lib/openzeppelin-contracts/"
]

[profile.default.fuzz]
runs = 1000

[rpc_endpoints]
fuji = "${AVALANCHE_FUJI_RPC}"
avalanche = "${AVALANCHE_RPC}"
